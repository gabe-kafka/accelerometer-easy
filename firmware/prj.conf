# Thingy:91 X — Accelerometer + LTE-M Demo
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# Accelerometer (ADXL367 on I2C2)
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_ADXL367=y

# Modem
CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LINK_CONTROL=y
CONFIG_MODEM_INFO=y

# Networking (offloaded to modem)
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=n
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y

# nPM1300 PMIC / battery monitoring
CONFIG_MFD=y
CONFIG_REGULATOR=y

# MCUboot image confirmation
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y

# HTTPS POST to Supabase
CONFIG_REST_CLIENT=y
CONFIG_REST_CLIENT_LOG_LEVEL_DBG=y
CONFIG_MODEM_KEY_MGMT=y
CONFIG_DATE_TIME=y
CONFIG_POSIX_API=y
CONFIG_LOG=y

# Hologram SIM APN
CONFIG_PDN=y
CONFIG_PDN_DEFAULTS_OVERRIDE=y
CONFIG_PDN_DEFAULT_APN="hologram"

# Debug: LTE, PDN, and AT monitor verbose logging
CONFIG_LTE_LC_LOG_LEVEL_DBG=y
CONFIG_PDN_LOG_LEVEL_DBG=y
CONFIG_AT_MONITOR_LOG_LEVEL_DBG=y

# Memory
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=16384
